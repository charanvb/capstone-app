apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    networking.gke.io/managed-certificates: app-cert


spec:
  rules:
  - http:
      paths:
      # ========== UI ROUTES ==========
      # Catch-all route for frontend application
      - path: /
        pathType: Prefix
        backend: 
          service:
            name: ui-service
            port:
              number: 80