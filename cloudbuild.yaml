steps:

# 🔹 1. Build Images with UNIQUE TAG
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/user-service:$SHORT_SHA', './microservices/user-service']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/product-service:$SHORT_SHA', './microservices/product-service']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/cart-service:$SHORT_SHA', './microservices/cart-service']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/payment-service:$SHORT_SHA', './microservices/payment-service']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/ui-service:$SHORT_SHA', './microservices/ui-service']


# 🔹 2. Replace image tags inside k8s YAML (GitOps style)
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      sed -i "s|user-service:.*|user-service:$SHORT_SHA|g" k8s/user-deployment.yaml
      sed -i "s|product-service:.*|product-service:$SHORT_SHA|g" k8s/product-deployment.yaml
      sed -i "s|cart-service:.*|cart-service:$SHORT_SHA|g" k8s/cart-deployment.yaml
      sed -i "s|payment-service:.*|payment-service:$SHORT_SHA|g" k8s/payment-deployment.yaml
      sed -i "s|ui-service:.*|ui-service:$SHORT_SHA|g" k8s/ui-deployment.yaml


- name: 'gcr.io/cloud-builders/kubectl'
  args: ['delete', '-f', 'k8s/', '--ignore-not-found=true']
  env:
    - 'CLOUDSDK_COMPUTE_ZONE=europe-west1-b'
    - 'CLOUDSDK_CONTAINER_CLUSTER=charan-gke-01'


# 🔹 3. Deploy to GKE using kubectl (AUTO AUTH via env)
- name: 'gcr.io/cloud-builders/kubectl'
  args: ['apply', '-f', 'k8s/']
  env:
    - 'CLOUDSDK_COMPUTE_ZONE=europe-west1-b'
    - 'CLOUDSDK_CONTAINER_CLUSTER=charan-gke-01'


# 🔹 4. Push images to Artifact Registry
images:
- 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/user-service:$SHORT_SHA'
- 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/product-service:$SHORT_SHA'
- 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/cart-service:$SHORT_SHA'
- 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/payment-service:$SHORT_SHA'
- 'us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/ui-service:$SHORT_SHA'


# 🔹 5. Logging
options:
  logging: CLOUD_LOGGING_ONLY
