apiVersion: apps/v1
kind: Deployment
metadata:
  name: charan-capstone-app-user-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
      - name: user
        image: us-west1-docker.pkg.dev/citric-kit-489316-g6/charan-ar/user-service:latest
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP